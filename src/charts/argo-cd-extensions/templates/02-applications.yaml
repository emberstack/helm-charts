{{- range .Values.applications }}
{{- $item := . -}}
{{- if eq (include "common.item.enabled" (dict "item" $item)) "true" }}
{{- $fullName := include "common.names.item.fullname" (dict "item" $item "context" $) }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $fullName }}
  namespace: {{ include "common.names.item.namespace" (dict "item" $item "context" $) }}
  labels:
    {{- include "common.labels.item" (dict "item" $item "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
  {{- include "common.annotations.render" (dict "annotations" (merge (default dict $item.annotations) (default dict $.Values.commonAnnotations)) "context" $) | nindent 2 }}
  {{- if $item.finalizers }}
  finalizers:
    {{- toYaml $item.finalizers | nindent 4 }}
  {{- end }}
spec:
  project: {{ $item.project | default "default" }}
  {{- if $item.source }}
  source:
    {{- toYaml $item.source | nindent 4 }}
  {{- else if $item.sources }}
  sources:
    {{- toYaml $item.sources | nindent 4 }}
  {{- else }}
  {{- fail "Either source or sources is required for Application" }}
  {{- end }}
  destination:
    {{- if $item.destination }}
    {{- if $item.destination.server }}
    server: {{ $item.destination.server }}
    {{- else if $item.destination.name }}
    name: {{ $item.destination.name }}
    {{- else }}
    server: https://kubernetes.default.svc
    {{- end }}
    {{- if $item.destination.namespace }}
    namespace: {{ $item.destination.namespace }}
    {{- else }}
    namespace: {{ $.Release.Namespace }}
    {{- end }}
    {{- else }}
    server: https://kubernetes.default.svc
    namespace: {{ $.Release.Namespace }}
    {{- end }}
  {{- if $item.ignoreDifferences }}
  ignoreDifferences:
    {{- toYaml $item.ignoreDifferences | nindent 4 }}
  {{- end }}
  {{- if $item.info }}
  info:
    {{- toYaml $item.info | nindent 4 }}
  {{- end }}
  {{- if $item.revisionHistoryLimit }}
  revisionHistoryLimit: {{ $item.revisionHistoryLimit }}
  {{- end }}
  {{- if $item.syncPolicy }}
  syncPolicy:
    {{- toYaml $item.syncPolicy | nindent 4 }}
  {{- end }}
{{- if $item.operation }}
operation:
  {{- toYaml $item.operation | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
