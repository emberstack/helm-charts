{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "azurite.fullname" . }}
  namespace: {{ include "azurite.namespace" . }}
  labels:
    {{- include "azurite.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- $pvcAnnotations := dict }}
  {{- if .Values.persistence.resourcePolicy }}
  {{- $_ := set $pvcAnnotations "helm.sh/resource-policy" .Values.persistence.resourcePolicy }}
  {{- end }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list $pvcAnnotations .Values.persistence.annotations .Values.commonAnnotations) "context" $) | fromYaml }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- include "common.storage.class" (dict "persistence" .Values.persistence "global" .Values.global) | nindent 2 }}
{{- end }}
