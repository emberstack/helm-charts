{{- if .Values.service.enabled }}
{{- $config := default dict .Values.configuration }}
{{- $port := "" }}
{{- if $config.blobEnabled }}
{{- $port = .Values.service.blobPort }}
{{- else if $config.queueEnabled }}
{{- $port = .Values.service.queuePort }}
{{- else if $config.tableEnabled }}
{{- $port = .Values.service.tablePort }}
{{- end }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "azurite.fullname" . }}-test-connection"
  namespace: {{ include "azurite.namespace" . }}
  labels:
    {{- include "azurite.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: http-test
      image: {{ include "common.images.image" (dict "imageRoot" .Values.testImage "context" $) }}
      command: ['sh', '-c']
      args: ['wget -q -S -O /dev/null http://{{ include "azurite.fullname" . }}:{{ $port }}/ 2>&1 | grep -q "HTTP/"']
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
{{- end }}
