## @section Global parameters
## Global values shared across parent and subcharts.
global: {}
  # image:
  #   registry: ""       # Override image registry for all containers
  #   tag: ""            # Override image tag for all containers
  #   pullSecrets: []    # Pull secrets for all containers
  # podLabels: {}        # Labels added to all pods across subcharts
  # podAnnotations: {}   # Annotations added to all pods across subcharts
  # extraEnvVars: []     # Env vars injected into all containers across subcharts
  # serviceAccount:
  #   create: true       # Override service account creation across subcharts
  #   name: ""           # Override service account name across subcharts
  # storageClass: ""
  # kubeVersion: ""
  # compatibility:
  #   openshift:
  #     adaptSecurityContext: ""   # force | disabled | auto (default)

## @section Common parameters
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}
extraObjects: []

## @section Image parameters
image:
  registry: mcr.microsoft.com
  repository: azure-storage/azurite
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

## Image used for helm test pods
testImage:
  registry: docker.io
  repository: busybox
  tag: latest
  pullPolicy: IfNotPresent

## @section Azurite configuration
configuration:
  ## Enable Blob service (port 10000)
  blobEnabled: true
  ## Enable Queue service (port 10001)
  queueEnabled: true
  ## Enable Table service (port 10002)
  tableEnabled: true
  ## Loose mode — relaxes API version checks and response validation
  loose: true
  ## Disable product style URL (use path-style instead)
  disableProductStyleUrl: true
  ## Skip API version check
  skipApiVersionCheck: true
  ## In-memory persistence (data lost on restart, ignores PVC)
  inMemoryPersistence: false
  ## Debug log file path (empty = log to stdout, recommended for K8s)
  debugLog: ""
  ## HTTPS cert/key PEM paths (leave empty for HTTP)
  ## Requires mounting certs via extraVolumes/extraVolumeMounts
  certPath: ""
  keyPath: ""
  ## OAuth support (set to "basic" to enable)
  oauth: ""
  ## Disable access log output
  silent: false
  ## Disable telemetry collection
  disableTelemetry: false
  ## In-memory extent store size limit in MB (only used with inMemoryPersistence)
  extentMemoryLimit: ""
  ## PFX certificate password (when certPath points to a .pfx file)
  certPassword: ""
  ## Extra arguments to pass to azurite
  extraArgs: []

## @section Deployment parameters
deployment:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 3
  updateStrategy:
    type: Recreate
  annotations: {}
  labels: {}
  minReadySeconds: ""

## @section Diagnostic mode
## Overrides command, args, probes, and lifecycleHooks for debugging.
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

## @section Container parameters
command: []
args: []

extraContainerPorts: []

## Probes — automatically target the first enabled service (blob > queue > table).
## diagnosticMode disables all probes.
livenessProbe:
  tcpSocket:
    port: blob
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
customLivenessProbe: {}

readinessProbe:
  tcpSocket:
    port: blob
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
customReadinessProbe: {}

startupProbe:
  tcpSocket:
    port: blob
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 60
  successThreshold: 1
customStartupProbe: {}

resources: {}
# requests:
#   cpu: 100m
#   memory: 128Mi
# limits:
#   cpu: 250m
#   memory: 512Mi
resourcesPreset: ""   # nano, micro, small, medium, large, xlarge, 2xlarge

lifecycleHooks: {}

extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

extraVolumeMounts: []
extraVolumes: []

## @section Pod parameters
podLabels: {}
podAnnotations: {}

podSecurityContext:
  enabled: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  enabled: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

## Affinity presets (convenience). Override with 'affinity' for full control.
podAffinityPreset: ""        # soft | hard
podAntiAffinityPreset: ""    # soft | hard
nodeAffinityPreset:
  type: ""                   # soft | hard
  key: ""
  values: []
affinity: {}

nodeSelector: {}
tolerations: []
topologySpreadConstraints: []
priorityClassName: ""
schedulerName: ""
terminationGracePeriodSeconds: ""
dnsPolicy: ""
dnsConfig: {}
hostNetwork: false

initContainers: []
sidecars: []

## @section Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

## @section RBAC
rbac:
  create: false
  clusterRole:
    rules: []
  role:
    rules: []

## @section Service parameters
service:
  enabled: true
  type: ClusterIP
  ## Blob service port (container always listens on 10000)
  blobPort: 10000
  ## Queue service port (container always listens on 10001)
  queuePort: 10001
  ## Table service port (container always listens on 10002)
  tablePort: 10002
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: ""
  annotations: {}
  labels: {}
  extraPorts: []

## @section Ingress parameters
ingress:
  enabled: false
  ingressClassName: ""
  hostname: ""
  path: /
  pathType: Prefix
  annotations: {}
  labels: {}
  tls: false
  extraHosts: []
  extraTls: []
  extraRules: []

## @section HTTPRoute parameters (Gateway API)
httpRoute:
  enabled: false
  parentRefs: []
  # - name: my-gateway
  #   namespace: gateway-ns
  #   sectionName: https
  hostnames: []
  rules: []
  # - matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   backendRefs:
  #     - name: ""      # defaults to fullname
  #       port: 10000   # defaults to service.blobPort
  #   filters: []
  annotations: {}
  labels: {}
  ## HTTP→HTTPS redirect companion route
  httpRedirect:
    enabled: false
    parentRefs: []
    hostnames: []
    annotations: {}
    labels: {}
    scheme: https
    statusCode: 301
    port: ""
    path: {}

## @section PodDisruptionBudget parameters
pdb:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

## @section NetworkPolicy parameters
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
  allowExternalDNS: true

## @section ServiceMonitor parameters (Prometheus Operator)
serviceMonitor:
  enabled: false
  namespace: ""
  port: blob
  path: /metrics
  interval: 30s
  scrapeTimeout: ""
  labels: {}
  annotations: {}
  relabelings: []
  metricRelabelings: []
  honorLabels: false

## @section ConfigMap parameters
configMap:
  enabled: false
  data: {}

## @section Persistence parameters
persistence:
  enabled: true
  resourcePolicy: ""   # Set to "keep" to preserve PVC on helm uninstall
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  existingClaim: ""
  mountPath: /data
  subPath: ""
  annotations: {}
