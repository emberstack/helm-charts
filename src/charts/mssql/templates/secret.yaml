{{- $config := default dict .Values.configuration -}}
{{- if not $config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mssql.fullname" . }}
  namespace: {{ include "mssql.namespace" . }}
  labels:
    {{- include "mssql.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  sa-password: {{ required "configuration.saPassword is required when configuration.existingSecret is not set" $config.saPassword | quote }}
{{- end }}
