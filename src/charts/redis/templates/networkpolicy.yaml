{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "redis.fullname" . }}
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "redis.labels.matchLabels" (dict "customLabels" .Values.podLabels "context" $) | nindent 6 }}
  {{- if .Values.networkPolicy.policyTypes }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
  {{- end }}
  ingress:
    {{- /* Allow intra-cluster Redis traffic */}}
    - from:
        - podSelector:
            matchLabels:
              {{- include "redis.labels.matchLabels" (dict "customLabels" .Values.podLabels "context" $) | nindent 14 }}
      ports:
        - port: redis
          protocol: TCP
        {{- if and .Values.sentinel.enabled (eq .Values.architecture "replication") }}
        - port: sentinel
          protocol: TCP
        {{- end }}
        {{- if eq .Values.architecture "cluster" }}
        - port: cluster
          protocol: TCP
        {{- end }}
    {{- if .Values.metrics.enabled }}
    - ports:
        - port: metrics
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if has "Egress" .Values.networkPolicy.policyTypes }}
  egress:
    {{- /* Allow intra-cluster Redis traffic */}}
    - to:
        - podSelector:
            matchLabels:
              {{- include "redis.labels.matchLabels" (dict "customLabels" .Values.podLabels "context" $) | nindent 14 }}
      ports:
        - port: redis
          protocol: TCP
        {{- if and .Values.sentinel.enabled (eq .Values.architecture "replication") }}
        - port: sentinel
          protocol: TCP
        {{- end }}
        {{- if eq .Values.architecture "cluster" }}
        - port: cluster
          protocol: TCP
        {{- end }}
    {{- if .Values.networkPolicy.allowExternalDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}
    {{- if and .Values.sentinel.enabled .Values.sentinel.masterService.enabled }}
    {{- /* Allow master-discovery to reach Kubernetes API */}}
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
